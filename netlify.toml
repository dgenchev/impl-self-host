# Netlify Configuration for Dr Genchev Dental Bot

[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  # General function settings
  node_bundler = "esbuild"
  # All dependencies are external (node_modules)
  external_node_modules = ["@supabase/supabase-js", "openai", "node-telegram-bot-api"]

# Scheduled Functions

# Health check at 6 AM UTC (runs daily)
# Bulgarian time (UTC+2 winter / UTC+3 summer):
#   - Winter: 8 AM Bulgarian time
#   - Summer: 9 AM Bulgarian time
# Sends notification only if system has issues (or weekly summary on Monday)
[functions."health-check"]
  schedule = "0 6 * * *"

# Daily summary at 3 PM UTC (only sends if there are patient queries)
# Bulgarian time (UTC+2 winter / UTC+3 summer):
#   - Winter: 5 PM Bulgarian time
#   - Summer: 6 PM Bulgarian time
[functions."daily-summary"]
  schedule = "0 15 * * *"

# Redirects and Headers
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Security Headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; img-src 'self' data: https:; frame-src https://www.youtube.com https://www.google.com; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'"

# API endpoints - CORS restricted to production domains
# Functions also set this header via process.env.SITE_URL (takes precedence over this block)
[[headers]]
  for = "/.netlify/functions/*"
  [headers.values]
    Access-Control-Allow-Origin = "https://dentalimplantsgenchev.com"
    Access-Control-Allow-Headers = "Content-Type, x-webhook-signature"
    Access-Control-Allow-Methods = "GET, POST, OPTIONS"

# Environment variables (set in Netlify Dashboard)
# These are documented in .env.example

